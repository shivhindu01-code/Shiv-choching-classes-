
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiv Luxury Coaching</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1581090700227-6fa68f3bc5b1') no-repeat center center fixed;
  background-size: cover;
}

/* Top bar */
.topbar {
  height: 60px;
  background: rgba(10,88,202,0.9);
  color: white;
  display: flex;
  align-items: center;
  padding: 0 20px;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
.menu-btn { font-size:28px; cursor:pointer; margin-right:20px; transition:0.3s; }
.menu-btn:hover { color:#ffdd00; }

/* Sidebar */
.sidebar {
  position: fixed;
  top:0; left:-260px;
  width:260px; height:100%;
  background: rgba(8,66,152,0.95);
  color:white;
  padding-top:60px;
  transition:0.5s;
  z-index:1001;
}
.sidebar ul { list-style:none; padding:0; margin:0; }
.sidebar li {
  padding:15px 20px;
  cursor:pointer;
  transition:0.3s;
}
.sidebar li:hover { background:#0a58ca; transform:scale(1.05); }

/* Close button */
.close-btn {
  position:absolute; top:10px; right:20px;
  font-size:28px; cursor:pointer;
}

/* Sections */
.content { padding:80px 20px 20px 20px; }
.section { display:none; opacity:0; transition:all 0.7s ease; background:rgba(255,255,255,0.9); margin-bottom:20px; border-radius:15px; padding:20px; }
.section.active { display:block; opacity:1; animation:fadeIn 0.7s; }
@keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

/* Iframe styling */
iframe { width:100%; height:400px; border:none; border-radius:10px; }

/* Button links */
.section a { display:inline-block; padding:10px 20px; background:#0a58ca; color:white; text-decoration:none; border-radius:10px; margin-top:10px; transition:0.3s; }
.section a:hover { background:#084298; transform:scale(1.05); }

</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="menu-btn" onclick="toggleSidebar()">☰</span>
  <h1>Shiv Luxury Coaching</h1>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="close-btn" onclick="toggleSidebar()">×</div>
  <ul>
    <li onclick="showSection('notes')">Notes</li>
    <li onclick="showSection('videos')">Videos</li>
    <li onclick="showSection('test')">Test Series</li>
    <li onclick="showSection('contact')">Contact</li>
  </ul>
</div>

<!-- Content -->
<div class="content">
  <section id="notes" class="section active">
    <h2>Notes</h2>
    <iframe src="https://drive.google.com/uc?export=download&id=1oxU8vubzD9DmuLpYTTtvYZsA4iYB_S0q"></iframe>
  </section>

  <section id="videos" class="section">
    <h2>Videos</h2>
    <iframe src="https://www.instagram.com/reel/DVh506kAZOE/" frameborder="0"></iframe>
  </section>

  <section id="test" class="section">
    <h2>Test Series</h2>
    <iframe src="https://forms.gle/your-google-form-link" frameborder="0"></iframe>
  </section>

  <section id="contact" class="section">
    <h2>Contact</h2>
    <a href="https://wa.me/your-number" target="_blank">WhatsApp</a>
  </section>
</div>

<script>
function toggleSidebar(){
  let s = document.getElementById('sidebar');
  s.style.left = (s.style.left==='0px')?'-260px':'0px';
}

function showSection(id){
  let sections = document.querySelectorAll('.section');
  sections.forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  toggleSidebar();
}
</script>

</body>
</html>
